phases:
  - id: phase-1
    title: "Phase 1: Data Engineering Card Enhancement"
    description: "Update Card 4 to match professional quality of Cards 1-3"
    duration: "1 session"

    features:
      - id: feature-1.1
        title: "Feature 1.1: Enhanced Data Engineering Card"
        priority: 2
        user_story: "As a portfolio viewer, I want to see specific deliverables and professional tech stack icons on the Data Engineering card so that I can quickly understand the scope and impact of the work"
        acceptance_criteria:
          - "Card 4 displays three deliverables in stacked text format matching Card 2 style"
          - "Tech stack shows 4 AWS-centric icons (Lake Formation, Redshift, Glue, Airflow) with consistent visual quality"
          - "Icons use standardized viewBox (512×512), consistent styling, and match Cards 2-3 quality"
          - "Deliverables text is scannable with 'Title: Description' format"
          - "Visual consistency across all 4 cards (1-4)"
        tracer_strategy:
          minimal_flow: "Add deliverables → Replace Hadoop icon → Standardize all icons → Verify consistency"
          layers: "Content layer (JSX text) → Visual layer (SVG icons) → Styling layer (consistency)"
          expansion: "Additional metrics, interactive elements (deferred)"

        tasks:
          - title: "Add deliverables content in Card 2 format"
            priority: 1
            tracer: "Content layer - proves deliverables are visible and scannable"
            description: |
              - Add {/* Key Deliverables */} section after h2 title
              - Use space-y-3 max-w-[600px] container
              - Add three text-sm font-medium divs:
                1. "1P Data Migration & Integration: 9 first-party service pipelines with bulk validation"
                2. "Data Lake Rearchitecture: Lake Formation with secure tagging & self-service analytics"
                3. "Development Catalogs: PII-redacted prod-grade data for lower environments"
              - Match Card 2 styling exactly (isOutlineMode support)
            deliverable: "Deliverables visible on Card 4 with proper formatting"
            reference: "src/app/page.tsx lines 156-180 (Card 2 deliverables)"
            tdd: false

          - title: "Source and prepare AWS Architecture Icons"
            priority: 1
            tracer: "Icon sourcing - proves we have professional quality SVGs"
            description: |
              - Download AWS Architecture Icons package or source from official AWS
              - Extract: Lake Formation, Redshift, Glue SVG files
              - Source Apache Airflow from official Apache project or Devicon
              - Process SVGs:
                * Standardize viewBox to "0 0 512 512"
                * Set fill="#534C44"
                * Remove unnecessary metadata/carrier groups
                * Ensure width="100%" height="100%" for scaling
              - Test rendering at 100px size for clarity
            deliverable: "4 clean, standardized SVG files ready for integration"
            reference: "https://aws.amazon.com/architecture/icons/"
            tdd: false

          - title: "Replace tech stack icons in Card 4"
            priority: 2
            depends_on: ["Source and prepare AWS Architecture Icons"]
            tracer: "Visual layer - proves icons are consistent with Cards 2-3"
            description: |
              - Replace AWS Glue icon (lines 451-474) with new standardized version
              - Replace Airflow icon (lines 476-496) with new standardized version
              - Replace Spark icon (lines 498-518) with AWS Lake Formation
              - Replace Hadoop icon (lines 519-548) with AWS Redshift
              - Ensure all containers use:
                * width: 100px, height: 100px
                * padding: 8px
                * opacity: 0.4 (normal) / 0.6 (outline mode)
              - Remove size inconsistency (110px → 100px for all)
              - Test in both normal and outline modes
            deliverable: "Card 4 displays AWS-centric tech stack with visual consistency"
            reference: "src/app/page.tsx lines 438-613 (Card 4 current implementation)"
            tdd: false

          - title: "Verify visual consistency across cards"
            priority: 2
            depends_on: ["Add deliverables content in Card 2 format", "Replace tech stack icons in Card 4"]
            tracer: "Validation layer - proves Card 4 matches Cards 1-3 quality"
            description: |
              - Visual inspection:
                * Compare icon clarity across Cards 2, 3, 4
                * Verify deliverables formatting matches Card 2
                * Check spacing and alignment
                * Test outline mode toggle
              - Regression check:
                * Verify Cards 1-3 unchanged
                * Check responsive behavior
                * Test metric display still works
              - Browser testing (Chrome, Safari, Firefox)
            deliverable: "Card 4 meets professional quality standard of Cards 1-3"
            tdd: false
